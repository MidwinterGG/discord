<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="4; url=https://discord.gg/Abfz57Pf7D">
  <title>Miðwinter Discord</title>
  <meta name="description" content="Join the Miðwinter Discord community.">
  <meta property="og:title" content="Miðwinter">
  <meta property="og:description" content="Join the Miðwinter Discord community.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="img/midbg.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Miðwinter">
  <meta name="twitter:description" content="Join the Miðwinter Discord community.">
  <meta name="twitter:image" content="img/midbg.png">
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
      background:
        linear-gradient(rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.82)),
        url("./img/midbg.png") center / cover no-repeat;
      display: grid;
      place-items: center;
      overflow-x: hidden;
    }

    main {
      width: min(92vw, 720px);
      padding: 48px 28px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(3rem, 12vw, 7.5rem);
      font-weight: 800;
      line-height: 0.95;
      letter-spacing: 0;
      text-shadow: 0 5px 28px rgba(0, 0, 0, 0.75);
    }

    .subtitle {
      margin: 22px auto 0;
      max-width: 620px;
      font-size: clamp(1.05rem, 3vw, 1.45rem);
      line-height: 1.55;
      color: rgba(255, 255, 255, 0.88);
      text-shadow: 0 3px 18px rgba(0, 0, 0, 0.75);
    }

    .join-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 190px;
      min-height: 54px;
      margin-top: 34px;
      padding: 15px 26px;
      border: 1px solid rgba(210, 235, 255, 0.65);
      border-radius: 8px;
      color: #07111f;
      background: linear-gradient(135deg, #f4fbff, #a8d9ff);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.38), 0 0 30px rgba(118, 193, 255, 0.22);
      font-size: 1rem;
      font-weight: 800;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .join-button:hover,
    .join-button:focus-visible {
      background: linear-gradient(135deg, #ffffff, #c7e8ff);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.48), 0 0 42px rgba(118, 193, 255, 0.34);
      transform: translateY(-2px);
    }

    .join-button:focus-visible {
      outline: 3px solid rgba(255, 255, 255, 0.9);
      outline-offset: 4px;
    }

    .countdown {
      margin: 22px 0 0;
      font-size: 0.92rem;
      color: rgba(255, 255, 255, 0.72);
      text-shadow: 0 2px 14px rgba(0, 0, 0, 0.8);
    }

    @media (max-width: 520px) {
      main {
        padding: 36px 18px;
      }

      .join-button {
        width: min(100%, 280px);
      }
    }
  </style>
</head>
<body>
  <main aria-label="Miðwinter Discord invite">
    <h1>Miðwinter</h1>
    <p class="subtitle">Redirecting you to the Miðwinter Discord community...</p>
    <a class="join-button" href="https://discord.gg/Abfz57Pf7D">Join Discord</a>
    <p class="countdown">Redirecting in 4 seconds.</p>
  </main>
  <script>
    window.setTimeout(function () {
      window.location.href = "https://discord.gg/Abfz57Pf7D";
    }, 4000);
  </script>
</body>
</html>
