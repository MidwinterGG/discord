<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="4; url=https://discord.gg/Abfz57Pf7D">
  <title>Miðwinter Discord</title>
  <meta name="description" content="Join the Miðwinter Discord community.">
  <meta property="og:title" content="Miðwinter">
  <meta property="og:description" content="Join the Miðwinter Discord community.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="img/midbg.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Miðwinter">
  <meta name="twitter:description" content="Join the Miðwinter Discord community.">
  <meta name="twitter:image" content="img/midbg.png">
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
      background:
        linear-gradient(rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.82)),
        url("./img/midbg.png") center / cover no-repeat;
      overflow-x: hidden;
    }

    main {
      position: fixed;
      right: 0;
      bottom: clamp(44px, 10vh, 96px);
      left: 0;
      padding: 0 18px;
      text-align: center;
    }

    .join-button {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 236px;
      min-height: 58px;
      padding: 15px 28px 14px;
      border: 2px solid #5d4a39;
      border-radius: 0;
      color: #f6ead3;
      background:
        linear-gradient(90deg, rgba(52, 28, 18, 0.96), rgba(103, 55, 32, 0.96) 50%, rgba(52, 28, 18, 0.96)),
        radial-gradient(circle at 50% 0%, rgba(226, 151, 75, 0.3), transparent 52%);
      box-shadow:
        inset 0 0 0 1px #1f1510,
        inset 0 0 0 4px rgba(188, 116, 61, 0.16),
        inset 0 14px 18px rgba(255, 198, 116, 0.08),
        inset 0 -18px 24px rgba(14, 8, 6, 0.55),
        0 0 0 1px rgba(196, 143, 91, 0.34),
        0 14px 32px rgba(0, 0, 0, 0.55);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 0.94rem;
      font-weight: 700;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      text-shadow: 0 2px 0 #1a0d08, 0 0 12px rgba(255, 202, 132, 0.26);
      transition: filter 160ms ease, transform 160ms ease, box-shadow 160ms ease;
    }

    .join-button::before {
      position: absolute;
      inset: 5px;
      border: 1px solid rgba(222, 156, 92, 0.35);
      content: "";
      pointer-events: none;
    }

    .join-button::after {
      width: 0.72em;
      height: 0.72em;
      margin-left: 0.7em;
      border-top: 2px solid currentColor;
      border-right: 2px solid currentColor;
      content: "";
      transform: rotate(45deg);
    }

    .join-button:hover,
    .join-button:focus-visible {
      filter: brightness(1.12) saturate(1.08);
      box-shadow:
        inset 0 0 0 1px #1f1510,
        inset 0 0 0 4px rgba(188, 116, 61, 0.2),
        inset 0 14px 18px rgba(255, 198, 116, 0.1),
        inset 0 -18px 24px rgba(14, 8, 6, 0.55),
        0 0 0 1px rgba(230, 171, 103, 0.52),
        0 16px 34px rgba(0, 0, 0, 0.6);
    }

    .join-button:focus-visible {
      outline: 2px solid rgba(246, 234, 211, 0.85);
      outline-offset: 4px;
    }

    @media (max-width: 520px) {
      main {
        bottom: 44px;
      }

      .join-button {
        min-width: 216px;
        min-height: 54px;
        padding: 14px 22px 13px;
        font-size: 0.82rem;
      }
    }
  </style>
</head>
<body>
  <main aria-label="Miðwinter Discord invite">
    <a class="join-button" href="https://discord.gg/Abfz57Pf7D">Join the Discord</a>
  </main>
  <script>
    window.setTimeout(function () {
      window.location.href = "https://discord.gg/Abfz57Pf7D";
    }, 4000);
  </script>
</body>
</html>
